name: Publish Images to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  workflow_dispatch:

concurrency:
  group: dockerhub-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_PLATFORMS: linux/amd64

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: ./server
            dockerfile: ./server/Dockerfile
            image: skillhub-server
          - name: web
            context: ./web
            dockerfile: ./web/Dockerfile
            image: skillhub-web
          - name: scanner
            context: ./scanner
            dockerfile: ./scanner/Dockerfile
            image: skillhub-scanner

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dockerhub-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=dockerhub-${{ matrix.name }}
